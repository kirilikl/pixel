<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="color-panel">
            <div class="color-box" style="background: rgb(255, 102, 46);"></div>
            <div class="color-box" style="background: rgb(26, 218, 84);"></div>
            <div class="color-box" style="background: rgb(83, 15, 255);"></div>
            <div class="erase tool">
                <img src="https://cdn-icons-png.flaticon.com/128/10435/10435515.png">
            </div>
            <div class="fill tool">
                <img src="https://cdn-icons-png.flaticon.com/128/3914/3914146.png">
            </div>
            <div class="save tool">
                <img src="https://cdn-icons-png.flaticon.com/128/3917/3917423.png">
            </div>
        </div>
        <div class="field">
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="script.js"></script>
</body>
</html>
